<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>loreholm — coming soon</title>
<meta name="description" content="loreholm: a memory keep for humans and their LLMs. Keep your data on your mantle. Coming soon.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏕️</text></svg>">
<style>
  :root {
    --sky-top: #0b1026;
    --sky-bottom: #2a2a4a;
    --ink: #e8e4d8;
    --ink-dim: #9b97a8;
    --warm: #ffb347;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 100%);
    color: var(--ink);
    font-family: ui-serif, "Iowan Old Style", Georgia, "Times New Roman", serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 2rem 1rem;
    text-align: center;
  }
  .scene {
    width: min(520px, 92vw);
    height: auto;
    display: block;
    margin-bottom: 1.5rem;
  }
  h1 {
    font-size: clamp(2rem, 6vw, 3rem);
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .tagline {
    margin-top: 0.75rem;
    font-size: clamp(1rem, 3vw, 1.2rem);
    color: var(--ink-dim);
    font-style: italic;
  }
  .soon {
    margin-top: 1.75rem;
    font-size: 0.85rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--warm);
  }
  .links {
    margin-top: 2.25rem;
    display: flex;
    gap: 1.75rem;
    justify-content: center;
    font-size: 0.95rem;
  }
  .links a {
    color: var(--ink-dim);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color 0.2s, border-color 0.2s;
  }
  .links a:hover { color: var(--ink); border-color: var(--warm); }
  footer {
    margin-top: 3rem;
    font-size: 0.78rem;
    color: #6b6880;
  }

  /* --- scene animations --- */
  .puff {
    transform-box: fill-box;
    transform-origin: center;
    opacity: 0;
    animation: drift 5s ease-out infinite;
  }
  .puff.p2 { animation-delay: 1.6s; }
  .puff.p3 { animation-delay: 3.2s; }
  @keyframes drift {
    0%   { transform: translate(0, 0) scale(0.4); opacity: 0; }
    15%  { opacity: 0.55; }
    60%  { opacity: 0.3; }
    100% { transform: translate(14px, -54px) scale(1.7); opacity: 0; }
  }
  .window-glow { animation: flicker 3.4s ease-in-out infinite; }
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    42%      { opacity: 0.82; }
    58%      { opacity: 0.95; }
    74%      { opacity: 0.86; }
  }
  .star { animation: twinkle 4s ease-in-out infinite; }
  .star.s2 { animation-delay: 1.1s; }
  .star.s3 { animation-delay: 2.3s; }
  .star.s4 { animation-delay: 0.6s; }
  .star.s5 { animation-delay: 3.1s; }
  @keyframes twinkle {
    0%, 100% { opacity: 0.9; }
    50%      { opacity: 0.25; }
  }
  @media (prefers-reduced-motion: reduce) {
    .puff, .window-glow, .star { animation: none; }
    .puff { opacity: 0.35; }
  }
</style>
</head>
<body>

<svg class="scene" viewBox="0 0 520 340" role="img" aria-label="A cozy cabin on a small island at night, smoke rising from the chimney" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="windowlight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffb347" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#ffb347" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2240"/>
      <stop offset="100%" stop-color="#11142c"/>
    </linearGradient>
  </defs>

  <!-- stars -->
  <circle class="star"    cx="60"  cy="48"  r="1.6" fill="#e8e4d8"/>
  <circle class="star s2" cx="150" cy="26"  r="1.2" fill="#e8e4d8"/>
  <circle class="star s3" cx="300" cy="40"  r="1.5" fill="#e8e4d8"/>
  <circle class="star s4" cx="420" cy="30"  r="1.2" fill="#e8e4d8"/>
  <circle class="star s5" cx="470" cy="70"  r="1.4" fill="#e8e4d8"/>
  <circle class="star s3" cx="220" cy="64"  r="1.0" fill="#e8e4d8"/>
  <circle class="star s2" cx="380" cy="84"  r="1.1" fill="#e8e4d8"/>
  <circle class="star s4" cx="100" cy="92"  r="1.0" fill="#e8e4d8"/>

  <!-- moon -->
  <circle cx="436" cy="58" r="22" fill="#f4f0df" opacity="0.9"/>
  <circle cx="444" cy="50" r="20" fill="var(--sky-top, #0b1026)" opacity="0.92"/>

  <!-- water -->
  <rect x="0" y="268" width="520" height="72" fill="url(#water)"/>
  <ellipse cx="260" cy="268" rx="260" ry="6" fill="#2a3155" opacity="0.6"/>
  <!-- moon reflection -->
  <ellipse cx="430" cy="290" rx="26" ry="3" fill="#f4f0df" opacity="0.08"/>
  <ellipse cx="424" cy="302" rx="18" ry="2.4" fill="#f4f0df" opacity="0.06"/>

  <!-- the holm -->
  <path d="M 90 280 Q 110 236 170 232 L 350 232 Q 414 236 432 280 Q 436 290 420 292 L 102 292 Q 86 290 90 280 Z" fill="#1d2438"/>
  <ellipse cx="260" cy="238" rx="174" ry="14" fill="#252e48"/>

  <!-- pines -->
  <g fill="#16203a">
    <path d="M 138 232 L 152 196 L 166 232 Z"/>
    <path d="M 141 214 L 152 186 L 163 214 Z"/>
    <rect x="149" y="232" width="6" height="8"/>
    <path d="M 360 234 L 377 190 L 394 234 Z"/>
    <path d="M 364 212 L 377 178 L 390 212 Z"/>
    <rect x="374" y="234" width="6" height="9"/>
    <path d="M 398 238 L 410 208 L 422 238 Z"/>
    <rect x="407" y="238" width="5" height="7"/>
  </g>

  <!-- warm light pool spilling from the windows -->
  <ellipse class="window-glow" cx="252" cy="234" rx="92" ry="34" fill="url(#windowlight)"/>

  <!-- cabin -->
  <g>
    <!-- chimney (behind roof) -->
    <rect x="292" y="138" width="18" height="40" fill="#3d3148"/>
    <rect x="289" y="134" width="24" height="7" rx="2" fill="#4a3c57"/>
    <!-- roof -->
    <path d="M 192 178 L 260 130 L 328 178 Z" fill="#4a3c57"/>
    <path d="M 184 182 L 260 128 L 336 182 L 328 178 L 260 134 L 192 178 Z" fill="#5b4a6b"/>
    <!-- walls: stacked logs -->
    <g>
      <rect x="200" y="178" width="120" height="60" fill="#6b4f3a"/>
      <g stroke="#553e2d" stroke-width="1.5">
        <line x1="200" y1="190" x2="320" y2="190"/>
        <line x1="200" y1="202" x2="320" y2="202"/>
        <line x1="200" y1="214" x2="320" y2="214"/>
        <line x1="200" y1="226" x2="320" y2="226"/>
      </g>
      <!-- log ends -->
      <circle cx="200" cy="184" r="4" fill="#7d5d45"/>
      <circle cx="200" cy="208" r="4" fill="#7d5d45"/>
      <circle cx="200" cy="232" r="4" fill="#7d5d45"/>
      <circle cx="320" cy="184" r="4" fill="#7d5d45"/>
      <circle cx="320" cy="208" r="4" fill="#7d5d45"/>
      <circle cx="320" cy="232" r="4" fill="#7d5d45"/>
    </g>
    <!-- door -->
    <rect x="246" y="196" width="28" height="42" rx="3" fill="#3e2d20"/>
    <circle cx="268" cy="218" r="2" fill="#caa86a"/>
    <!-- windows, lit -->
    <g class="window-glow">
      <rect x="214" y="196" width="22" height="20" rx="2" fill="#ffc66e"/>
      <line x1="225" y1="196" x2="225" y2="216" stroke="#6b4f3a" stroke-width="2"/>
      <line x1="214" y1="206" x2="236" y2="206" stroke="#6b4f3a" stroke-width="2"/>
      <rect x="284" y="196" width="22" height="20" rx="2" fill="#ffc66e"/>
      <line x1="295" y1="196" x2="295" y2="216" stroke="#6b4f3a" stroke-width="2"/>
      <line x1="284" y1="206" x2="306" y2="206" stroke="#6b4f3a" stroke-width="2"/>
    </g>
    <!-- smoke -->
    <g fill="#c9c5d6">
      <circle class="puff"    cx="301" cy="128" r="7"/>
      <circle class="puff p2" cx="303" cy="128" r="6"/>
      <circle class="puff p3" cx="299" cy="128" r="8"/>
    </g>
  </g>

  <!-- dock + lantern -->
  <g>
    <rect x="330" y="252" width="58" height="5" rx="2" fill="#3a3048"/>
    <rect x="338" y="257" width="4" height="14" fill="#2e2740"/>
    <rect x="374" y="257" width="4" height="14" fill="#2e2740"/>
    <line x1="384" y1="226" x2="384" y2="252" stroke="#3a3048" stroke-width="3"/>
    <circle class="window-glow" cx="384" cy="222" r="5" fill="#ffc66e"/>
    <circle cx="384" cy="222" r="9" fill="url(#windowlight)"/>
  </g>
</svg>

<h1>loreholm</h1>
<p class="tagline">Keep your data on your mantle.</p>
<p class="soon">Coming&nbsp;soon</p>

<nav class="links">
  <a href="https://github.com/Loreholm/Loreholm">GitHub</a>
</nav>

<footer>A memory keep for humans and their LLMs — open source, AGPL/MIT.</footer>

</body>
</html>
