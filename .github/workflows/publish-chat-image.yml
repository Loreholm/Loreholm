# Builds and publishes the chat front-end image to GHCR. Publish only —
# deployment lives in the private infra repository. No secrets beyond the
# workflow's own GITHUB_TOKEN.
name: Publish Chat Image

on:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths:
      - "apps/chat/**"
      - ".github/workflows/publish-chat-image.yml"
  workflow_dispatch:

concurrency:
  group: loreholm-chat-image-publish
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish-chat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push chat image
        uses: docker/build-push-action@v6
        with:
          context: apps/chat
          file: apps/chat/Dockerfile
          push: true
          tags: |
            ghcr.io/loreholm/loreholm-chat:latest
            ghcr.io/loreholm/loreholm-chat:${{ github.sha }}
            ghcr.io/loreholm/loreholm-chat:${{ github.ref_name }}
